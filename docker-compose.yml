services:
  objective.pricetracker.api:
    image: ${DOCKER_REGISTRY-}objectivepricetrackerapi
    build:
      context: .
      dockerfile: src/Objective.PriceTracker.Api/Dockerfile
    depends_on: 
      postgresql:
        condition: service_healthy

  postgresql:
    image: postgres:latest
    container_name: postgresql_objective
    environment:
      POSTGRES_DB: postgres_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: od5TxpmFLtbAJMAp8ytv
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432
    volumes:
      - pgdata_objective:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  
  mailpit:
    image: axllent/mailpit
    container_name: mailpit_objective
    restart: unless-stopped
    volumes:
        - mailpit_objective:/data
    ports:
        - 8025:8025
        # - 1025:1025 # uncomment to make public smtp api outside of container
    environment:
        MP_MAX_MESSAGES: 5000
        MP_DATABASE: /data/mailpit.db
        MP_SMTP_AUTH_ACCEPT_ANY: 1
        MP_SMTP_AUTH_ALLOW_INSECURE: 1
volumes:
  pgdata_objective:
  mailpit_objective: